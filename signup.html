{% extends "base.html" %}
{% block title %}Create Account | ResumeSpark{% endblock %}
{% block content %}
<section class="auth-shell">
  <div class="auth-card">
    <div>
      <p class="eyebrow">New Account</p>
      <h1 class="auth-title">Create your ResumeSpark account</h1>
      <p class="hero-text">Start with email and password, then access your dashboard features.</p>
    </div>

    <form method="post" class="auth-form">
      <label>
        <span>Full Name</span>
        <input type="text" name="name" placeholder="Aarav Sharma" required>
      </label>
      <label>
        <span>Email</span>
        <input type="email" name="email" placeholder="student@example.com" required>
      </label>
      <label>
        <span>Password</span>
        <input type="password" name="password" placeholder="Create password" required>
      </label>
      <label>
        <span>Confirm Password</span>
        <input type="password" name="confirm_password" placeholder="Confirm password" required>
      </label>
      <button class="primary-btn" type="submit">Create Account</button>
    </form>

    <div class="auth-links single">
      <a href="{{ url_for('login') }}">Already have an account? Sign in</a>
    </div>
  </div>
</section>
{% endblock %}
